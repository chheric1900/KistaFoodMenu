name: Kista Lunch Menu Summary

on:
  schedule:
    - cron: '0 4 * * 1-5'
  workflow_dispatch:
    inputs:
      debug:
        description: 'Debug mode (skip webhook, log only)'
        type: boolean
        default: false
      dry_run:
        description: 'Dry run (fetch only, skip AI + webhook)'
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: kista-lunch-menu
  cancel-in-progress: false

jobs:
  fetch-and-summarize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch and summarize menus
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_PROJECT_KISTA_FOOD_MENU_FREE_TIER_API_KEY }}
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL_FOR_KISTA_FOOD_MENU }}
          DEBUG: ${{ inputs.debug && '1' || '0' }}
          DRY_RUN: ${{ inputs.dry_run && '1' || '0' }}
        run: python fetch_menus.py

      - name: Commit token usage
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add token_usage.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "Update token usage $(date +%Y-%m-%d)"
          git push

      - name: Notify on failure
        if: failure()
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL_FOR_KISTA_FOOD_MENU }}
        run: |
          if [ -f .failure_notified ]; then
            echo "Already notified by script."
          elif [ -n "$WEBHOOK_URL" ]; then
            curl -s -H "Content-Type: application/json" \
              -d '{"content": "⚠️ Kista Lunch Menu workflow failed outside the main script (setup/install/commit step). Check the Actions log."}' \
              "$WEBHOOK_URL"
          fi
