name: Kista Lunch Menu Summary

on:
  schedule:
    - cron: '0 6 * * 1-5'
  workflow_dispatch:

jobs:
  fetch-and-summarize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch and summarize menus
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_PROJECT_KISTA_FOOD_MENU_FREE_TIER_API_KEY }}
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL_FOR_KISTA_FOOD_MENU }}
        run: python fetch_menus.py
